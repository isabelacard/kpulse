services:
  - type: web
    name: kpulse-server
    runtime: node
    rootDir: server
    buildCommand: npm install
    startCommand: npx tsx ./src/main.ts
    envVars:
      - key: PORT
        value: 3000
      - key: NODE_ENV
        value: production
      - key: SUPABASE_URL
        sync: true
      - key: SUPABASE_PUBLISHABLE_KEY
        sync: true
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: true
      - key: SMTP_PASS
        sync: true

  - type: web
    name: kpulse-screen
    runtime: static
    rootDir: screen
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  - type: web
    name: kpulse-controller
    runtime: static
    rootDir: controller
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
